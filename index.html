<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>McAllen Chamber Email Toolkit</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        --font-serif: Georgia, "Times New Roman", serif;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --border-radius-xl: 16px;
      }

      /* Light mode */
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f4;
        --color-background-tertiary: #eeece8;
        --color-background-info: #eff6ff;
        --color-background-success: #f0fdf4;
        --color-background-warning: #fffbeb;
        --color-background-danger: #fef2f2;

        --color-text-primary: #111110;
        --color-text-secondary: #6b7280;
        --color-text-tertiary: #9ca3af;
        --color-text-info: #1d4ed8;
        --color-text-success: #15803d;
        --color-text-warning: #b45309;
        --color-text-danger: #dc2626;

        --color-border-tertiary: rgba(0,0,0,0.08);
        --color-border-secondary: rgba(0,0,0,0.14);
        --color-border-primary: rgba(0,0,0,0.22);
        --color-border-info: #93c5fd;
        --color-border-success: #86efac;
        --color-border-warning: #fcd34d;
        --color-border-danger: #fca5a5;
      }

      /* Dark mode */
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1c1c1a;
          --color-background-secondary: #252522;
          --color-background-tertiary: #2e2e2b;
          --color-background-info: #1e3a5f;
          --color-background-success: #14532d;
          --color-background-warning: #451a03;
          --color-background-danger: #450a0a;

          --color-text-primary: #f5f5f0;
          --color-text-secondary: #9ca3af;
          --color-text-tertiary: #6b7280;
          --color-text-info: #93c5fd;
          --color-text-success: #86efac;
          --color-text-warning: #fcd34d;
          --color-text-danger: #fca5a5;

          --color-border-tertiary: rgba(255,255,255,0.08);
          --color-border-secondary: rgba(255,255,255,0.14);
          --color-border-primary: rgba(255,255,255,0.22);
        }
      }

      html, body, #root {
        min-height: 100vh;
        background: var(--color-background-tertiary);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.5;
      }

      #root {
        padding: 0;
      }

      /* Form elements */
      input, select, textarea {
        font-family: var(--font-sans);
        font-size: 13px;
        color: var(--color-text-primary);
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 8px 10px;
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
      }
      input:focus, select:focus, textarea:focus {
        border-color: #003DA5;
        box-shadow: 0 0 0 2px rgba(0,61,165,0.12);
      }
      select {
        cursor: pointer;
      }
      textarea {
        resize: vertical;
        min-height: 60px;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--color-border-secondary); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--color-border-primary); }

      /* Screen reader only */
      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
